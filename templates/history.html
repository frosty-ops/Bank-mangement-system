<!DOCTYPE html>
<html>
<head>
    <title>Transaction History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">

    <h1>Transaction History</h1>

    <table border="1" cellpadding="10">

        <tr>
            <th>Type</th>
            <th>Amount (₹)</th>
            <th>Balance After (₹)</th>
            <th>Date & Time</th>
        </tr>

        {% for transaction in transactions %}
        <tr>
            <td>{{ transaction[0] }}</td>
            <td>{{ transaction[1] }}</td>
            <td>{{ transaction[2] }}</td>
            <td>{{ transaction[3] }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>

    <a href="/">
        <button>Back to Dashboard</button>
    </a>
    </div>
</body>
</html>
